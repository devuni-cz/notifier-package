version: 2

updates:
  - package-ecosystem: 'composer'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 10
    commit-message:
      prefix: 'composer'
    labels:
      - 'dependencies'
      - 'php'
    reviewers:
      - devuni-cz
    groups:
      laravel:
          patterns:
              - 'laravel/*'
      orchestra:
          patterns:
              - 'orchestra/*'
      pestphp:
          patterns:
              - 'pestphp/*'
      phpunit:
          patterns:
              - 'phpunit/*'
      phpstan:
          patterns:
              - 'phpstan/*'
              - 'larastan/*'
      symfony:
          patterns:
              - 'symfony/*'
      guzzle:
          patterns:
              - 'guzzlehttp/*'
      minor-and-patch:
          update-types:
              - 'minor'
              - 'patch'
    ignore:
      - dependency-name: 'laravel/framework'
        update-types: ['version-update:semver-major']
      - dependency-name: '*'
        update-types: ['version-update:semver-major']

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: 'ci'
      include: scope
    groups:
      actions:
          patterns:
              - 'actions/*'
      setup:
          patterns:
              - 'shivammathur/setup-php'
      codecov:
          patterns:
              - 'codecov/*'
      release:
          patterns:
              - 'softprops/action-gh-release'
              - 'stefanzweifel/git-auto-commit-action'
